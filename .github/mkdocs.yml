site_name: Design Patterns Dokumentation
theme:
  name: material
  language: de
  palette:
    # Ein helles, sauberes Farbschema (GoF-Stil)
    primary: white
    accent: indigo
  font:
    # 'Roboto' für den modernen Touch, 'Roboto Serif' für den Buch-Look
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

# Hier definierst du deine Kapitel-Struktur (GoF Beispiel)
nav:
  - Home: index.md
  - Erzeugungsmuster:
      - Singleton: singleton.md
      - Factory Method: factory.md
  - Strukturmuster:
      - Adapter: adapter.md
      - Proxy: proxy.md
  - Verhaltensmuster:
      - Observer: observer.md
      - Strategy: strategy.md

# Erweiterungen für schickere Inhalte
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
