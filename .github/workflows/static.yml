/* ═══════════════════════════════════════════════════════════════════════════
   KI Design Patterns — MkDocs Material Custom Theme
   Replikation des dunklen Navy/Lila HTML-Designs
   ═══════════════════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

/* ── Design-Tokens ──────────────────────────────────────────────────────── */
:root {
  --ki-bg:       #f8f7f4;   /* Seiten-Hintergrund: warmes Creme */
  --ki-surface:  #ffffff;
  --ki-sb:       #1a1a2e;   /* Sidebar/Header: dunkles Navy */
  --ki-sb-text:  #c8c8d8;   /* Sidebar-Text: helles Grau */
  --ki-act:      #a78bfa;   /* Aktive Nav-Elemente: Lila-Hell */
  --ki-act-bg:   rgba(167,139,250,.12);
  --ki-acc:      #6d28d9;   /* Akzent: Lila */
  --ki-al:       #ede9fe;   /* Lila-Hell (Blockquote-BG) */
  --ki-am:       #c4b5fd;   /* Lila-Mittel (Blockquote-Border) */
  --ki-tx:       #1e1e2e;   /* Fließtext */
  --ki-mt:       #64748b;   /* Muted-Text */
  --ki-bd:       #e2e8f0;   /* Borders */
  --ki-cb:       #f1f5f9;   /* Inline-Code-BG */
  --ki-code-bg:  #1e1e2e;   /* Code-Block-BG */
  --ki-code-fg:  #cdd6f4;   /* Code-Block-Text */
  --ki-green-bg: #065f46;   /* Tabellen-Erstspalte */
  --ki-green-fg: #d1fae5;
  --ki-amber-bg: #78350f;   /* Tabellen-Letzte Spalte */
  --ki-amber-fg: #fef3c7;
  --ki-ib:       #faf5ff;   /* Intent-Box-BG */
  --ki-ibd:      #7c3aed;   /* Intent-Box-Border */
  --ki-ibt:      #3b0764;   /* Intent-Box-Text */
}

/* ── Material-Theme-Variablen überschreiben ─────────────────────────────── */
[data-md-color-scheme="default"] {
  --md-primary-fg-color:        var(--ki-sb);
  --md-primary-fg-color--light: var(--ki-act);
  --md-primary-fg-color--dark:  #0f0f1a;
  --md-primary-bg-color:        #ffffff;
  --md-primary-bg-color--light: rgba(255,255,255,.7);

  --md-accent-fg-color:         var(--ki-acc);
  --md-accent-fg-color--transparent: rgba(109,40,217,.1);
  --md-accent-bg-color:         #ffffff;

  --md-default-fg-color:        var(--ki-tx);
  --md-default-bg-color:        var(--ki-bg);

  --md-typeset-color:           var(--ki-tx);
  --md-typeset-a-color:         var(--ki-acc);

  --md-code-bg-color:           var(--ki-code-bg);
  --md-code-fg-color:           var(--ki-code-fg);
  --md-code-hl-color:           rgba(167,139,250,.2);
}

/* ══════════════════════════════════════════════════════════════════════════
   TYPOGRAFIE — Georgia Serif wie im HTML-Design
   ══════════════════════════════════════════════════════════════════════════ */
body,
.md-typeset {
  font-family: "Georgia", "Crimson Text", serif;
  font-size: 1.05rem;
  line-height: 1.75;
  color: var(--ki-tx);
  background-color: var(--ki-bg);
}

/* ══════════════════════════════════════════════════════════════════════════
   TOP-HEADER — Navy mit weißem Logo-Text
   ══════════════════════════════════════════════════════════════════════════ */
.md-header {
  background-color: var(--ki-sb);
  border-bottom: 1px solid rgba(255,255,255,.08);
  box-shadow: none;
}

.md-header__title {
  font-family: "Georgia", serif;
  font-size: 1rem;
  color: #ffffff !important;
  letter-spacing: .01em;
}

/* KI-Badge im Titel */
.md-header__title::before {
  content: "KI";
  display: inline-block;
  background: var(--ki-acc);
  color: #fff;
  font-size: 10px;
  font-family: "JetBrains Mono", monospace;
  font-weight: 700;
  letter-spacing: .05em;
  padding: 2px 7px;
  border-radius: 3px;
  margin-right: 8px;
  vertical-align: middle;
}

/* Search-Feld */
.md-search__input {
  background-color: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 6px;
  color: #ffffff;
  font-family: "Georgia", serif;
}
.md-search__input::placeholder { color: rgba(255,255,255,.35); }
.md-search__input:focus        { border-color: var(--ki-act); }
.md-search__icon               { color: rgba(255,255,255,.5); }

/* Search-Ergebnis-Highlights */
.md-search-result__meta { color: var(--ki-act); font-family: monospace; }
mark { background: #fef08a; border-radius: 2px; }

/* ══════════════════════════════════════════════════════════════════════════
   LINKE SIDEBAR — Navy mit Lila Active-State (exakt wie HTML-Design)
   ══════════════════════════════════════════════════════════════════════════ */
.md-sidebar--primary {
  background-color: var(--ki-sb);
}
.md-sidebar--primary .md-sidebar__scrollwrap {
  background-color: var(--ki-sb);
}

/* Sidebar Scrollbar */
.md-sidebar--primary .md-sidebar__scrollwrap::-webkit-scrollbar { width: 4px; }
.md-sidebar--primary .md-sidebar__scrollwrap::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,.1); border-radius: 2px;
}

/* Nav-Sektion-Labels ("MUSTERKATALOG") */
.md-nav--primary > .md-nav__title {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: rgba(255,255,255,.25);
  background: none;
  padding: 16px 18px 8px;
  box-shadow: none;
}

/* Nav-Einträge allgemein */
.md-nav--primary .md-nav__item { margin: 0; }

/* H2-Links (Sektions-Titel) */
.md-nav--primary > .md-nav__list > .md-nav__item > .md-nav__link {
  font-family: "Georgia", serif;
  font-size: .82rem;
  color: #e2e8f0;
  border-left: 2px solid transparent;
  padding: 6px 18px;
  transition: color .15s, border-color .15s, background .15s;
}
.md-nav--primary > .md-nav__list > .md-nav__item > .md-nav__link:hover,
.md-nav--primary > .md-nav__list > .md-nav__item > .md-nav__link--active {
  color: var(--ki-act);
  border-left-color: var(--ki-act);
  background: var(--ki-act-bg);
}

/* H3-Links (Pattern-Namen) */
.md-nav--primary .md-nav__list .md-nav__list .md-nav__link {
  font-family: "JetBrains Mono", monospace;
  font-size: .72rem;
  color: var(--ki-sb-text);
  border-left: 2px solid transparent;
  padding: 3px 18px 3px 32px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color .12s, background .12s;
}
.md-nav--primary .md-nav__list .md-nav__list .md-nav__link:hover,
.md-nav--primary .md-nav__list .md-nav__list .md-nav__link--active {
  color: var(--ki-act);
  background: var(--ki-act-bg);
  border-left-color: var(--ki-act);
}

/* TOC integriert (rechte Sidebar wenn toc.integrate aus) */
.md-sidebar--secondary { background: var(--ki-bg); }
.md-sidebar--secondary .md-nav__link {
  font-family: "JetBrains Mono", monospace;
  font-size: .72rem;
  color: var(--ki-mt);
}
.md-sidebar--secondary .md-nav__link:hover,
.md-sidebar--secondary .md-nav__link--active { color: var(--ki-acc); }

/* ══════════════════════════════════════════════════════════════════════════
   MAIN CONTENT
   ══════════════════════════════════════════════════════════════════════════ */
.md-content {
  background-color: var(--ki-bg);
}
.md-content__inner {
  max-width: 880px;
  padding: 48px 52px 100px;
}

/* ── Überschriften ── */
.md-typeset h1 {
  font-family: "Georgia", serif;
  font-size: 2rem;
  font-weight: 400;
  color: var(--ki-tx);
  border-bottom: 2px solid var(--ki-al);
  padding-bottom: .5rem;
  margin-bottom: 1rem;
}

.md-typeset h2 {
  font-family: "Georgia", serif;
  font-size: 1.45rem;
  font-weight: 400;
  color: var(--ki-tx);
  border-bottom: 1px solid var(--ki-bd);
  padding: 1rem 0 .5rem;
  margin-top: 3.5rem;
}

.md-typeset h3 {
  font-family: "Georgia", serif;
  font-size: 1.2rem;
  font-weight: 400;
  font-style: italic;
  color: #3730a3;
  margin-top: 2.5rem;
  margin-bottom: .25rem;
}

.md-typeset h4 {
  font-family: "JetBrains Mono", monospace;
  font-size: .78rem;
  font-weight: 700;
  color: var(--ki-mt);
  text-transform: uppercase;
  letter-spacing: .08em;
  border-bottom: 1px solid var(--ki-bd);
  padding-bottom: .25rem;
  margin-top: 1.4rem;
}

.md-typeset h5, .md-typeset h6 {
  font-family: "JetBrains Mono", monospace;
  color: var(--ki-mt);
}

/* ── Links ── */
.md-typeset a {
  color: var(--ki-acc);
  text-decoration: none;
}
.md-typeset a:hover { text-decoration: underline; }

/* ── Fließtext ── */
.md-typeset p     { margin-bottom: .75rem; }
.md-typeset em    { color: var(--ki-mt); }
.md-typeset hr    { border-color: var(--ki-bd); margin: 2.5rem 0; }
.md-typeset ul li { margin-bottom: .25rem; }

/* ══════════════════════════════════════════════════════════════════════════
   BLOCKQUOTES — Lila Akzent wie im HTML-Design
   ══════════════════════════════════════════════════════════════════════════ */
.md-typeset blockquote {
  border-left: 3px solid var(--ki-am);
  background: var(--ki-al);
  padding: .6rem 1rem;
  margin: .9rem 0;
  border-radius: 0 6px 6px 0;
  font-size: .9rem;
  color: #4c1d95;
}
.md-typeset blockquote p { margin: 0; color: #4c1d95; }

/* ══════════════════════════════════════════════════════════════════════════
   ADMONITIONS als Intent-Boxen + farbige Pattern-Kategorien
   ══════════════════════════════════════════════════════════════════════════ */

/* Basis — kein gerundeter Rand, quadratische Ästhetik */
.md-typeset .admonition,
.md-typeset details {
  border-radius: 0 8px 8px 0;
  border-left: 3px solid var(--ki-ibd);
  border-top: none;
  border-right: none;
  border-bottom: none;
  font-size: .92rem;
  margin: 1rem 0;
}
.md-typeset .admonition-title,
.md-typeset summary {
  font-family: "JetBrains Mono", monospace;
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  padding: .45rem .75rem;
}

/* info → Intent-Box (Lila) */
.md-typeset .admonition.info  { background: var(--ki-ib); border-left-color: var(--ki-ibd); }
.md-typeset .info > .admonition-title { background: var(--ki-ibd); color: #fff; }

/* note → Allgemein (Navy) */
.md-typeset .admonition.note  { background: #f0f4f8; border-left-color: var(--ki-sb); }
.md-typeset .note > .admonition-title { background: var(--ki-sb); color: #fff; }

/* warning → Anti-Pattern (Bernstein) */
.md-typeset .admonition.warning { background: #fffbeb; border-left-color: #92400e; }
.md-typeset .warning > .admonition-title { background: #92400e; color: #fef3c7; }

/* danger → Pflicht (Rot) */
.md-typeset .admonition.danger { background: #fff1f2; border-left-color: #9f1239; }
.md-typeset .danger > .admonition-title { background: #9f1239; color: #ffe4e6; }

/* tip → Tipp (Grün) */
.md-typeset .admonition.tip   { background: #f0fdf4; border-left-color: #065f46; }
.md-typeset .tip > .admonition-title { background: #065f46; color: var(--ki-green-fg); }

/* success → Vorteil */
.md-typeset .admonition.success { background: #f0fdf4; border-left-color: #166534; }
.md-typeset .success > .admonition-title { background: #166534; color: var(--ki-green-fg); }

/* ══════════════════════════════════════════════════════════════════════════
   TABELLEN — Navy-Header, Grün erste Spalte, Bernstein letzte Spalte
   ══════════════════════════════════════════════════════════════════════════ */
.md-typeset table:not([class]) {
  width: 100%;
  border-collapse: collapse;
  font-family: "JetBrains Mono", monospace;
  font-size: .82rem;
  margin: .9rem 0;
}

.md-typeset table:not([class]) thead tr th {
  background-color: var(--ki-sb);
  color: var(--ki-sb-text);
  padding: 8px 12px;
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .07em;
  font-weight: 400;
  border: none;
}
/* Erste Spalte: Grün */
.md-typeset table:not([class]) thead tr th:first-child {
  background-color: var(--ki-green-bg);
  color: var(--ki-green-fg);
}
/* Letzte Spalte: Bernstein */
.md-typeset table:not([class]) thead tr th:last-child {
  background-color: var(--ki-amber-bg);
  color: var(--ki-amber-fg);
}

.md-typeset table:not([class]) tbody tr td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--ki-bd);
  border-left: none;
  border-right: none;
  vertical-align: top;
  line-height: 1.5;
  color: var(--ki-tx);
  background: none;
}
.md-typeset table:not([class]) tbody tr:hover td {
  background-color: #f8f6ff;
}
/* Gerade Zeilen leicht getönt */
.md-typeset table:not([class]) tbody tr:nth-child(even) td {
  background-color: #fafaf8;
}
.md-typeset table:not([class]) tbody tr:nth-child(even):hover td {
  background-color: #f8f6ff;
}

/* ══════════════════════════════════════════════════════════════════════════
   CODE — Dunkler Hintergrund, Lila-Rand wie im HTML-Design
   ══════════════════════════════════════════════════════════════════════════ */

/* Inline-Code */
.md-typeset code {
  font-family: "JetBrains Mono", monospace;
  font-size: .82em;
  background: var(--ki-cb);
  color: #5b21b6;
  padding: 2px 5px;
  border-radius: 3px;
}

/* Code-Blöcke */
.md-typeset pre {
  background: var(--ki-code-bg) !important;
  border-radius: 8px;
  border-left: 3px solid var(--ki-acc);
  margin: .9rem 0;
  line-height: 1.6;
}
.md-typeset pre > code {
  background: none;
  color: var(--ki-code-fg);
  font-size: .8rem;
  padding: 0;
}

/* Pygments Highlight-Theme anpassen (dark background) */
.highlight { background: var(--ki-code-bg) !important; border-radius: 8px; }
.highlight .hll { background: rgba(167,139,250,.15); }
.highlight .c, .highlight .c1, .highlight .cm { color: #6272a4; font-style: italic; }
.highlight .k  { color: #ff79c6; }
.highlight .kn { color: #ff79c6; }
.highlight .n  { color: var(--ki-code-fg); }
.highlight .s, .highlight .s1, .highlight .s2 { color: #f1fa8c; }
.highlight .mi { color: #bd93f9; }
.highlight .nc { color: #8be9fd; }
.highlight .nd { color: #50fa7b; }
.highlight .nf { color: #50fa7b; }
.highlight .o  { color: #ff79c6; }
.highlight .p  { color: var(--ki-code-fg); }

/* Copy-Button */
.md-clipboard { color: rgba(255,255,255,.3); }
.md-clipboard:hover { color: var(--ki-act); }

/* ══════════════════════════════════════════════════════════════════════════
   MERMAID-DIAGRAMME
   ══════════════════════════════════════════════════════════════════════════ */
.mermaid,
pre.mermaid {
  background: var(--ki-surface);
  border: 1px solid var(--ki-bd);
  border-radius: 8px;
  padding: 20px;
  margin: .9rem 0;
  overflow-x: auto;
  text-align: center;
}

/* ══════════════════════════════════════════════════════════════════════════
   PROGRESS-LEISTE oben (Material nutzt eigene — hier Farbe überschreiben)
   ══════════════════════════════════════════════════════════════════════════ */
.md-progress {
  background-color: var(--ki-acc) !important;
}

/* ══════════════════════════════════════════════════════════════════════════
   FOOTER
   ══════════════════════════════════════════════════════════════════════════ */
.md-footer {
  background-color: var(--ki-sb);
  color: var(--ki-sb-text);
}
.md-footer-meta { background-color: #0f0f1a; }
.md-footer__link { color: var(--ki-sb-text); }
.md-footer__link:hover { color: var(--ki-act); }

/* ══════════════════════════════════════════════════════════════════════════
   BACK-TO-TOP BUTTON
   ══════════════════════════════════════════════════════════════════════════ */
.md-top {
  background-color: var(--ki-acc);
  color: #ffffff;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(109,40,217,.35);
}
.md-top:hover { background-color: #5b21b6; }

/* ══════════════════════════════════════════════════════════════════════════
   RESPONSIVE — Mobile: Sidebar ausblenden
   ══════════════════════════════════════════════════════════════════════════ */
@media screen and (max-width: 76.1875em) {
  .md-nav--primary {
    background-color: var(--ki-sb);
  }
  .md-nav--primary .md-nav__title {
    background-color: #0f0f1a;
    color: #fff;
  }
}
