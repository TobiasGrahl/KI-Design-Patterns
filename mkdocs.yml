site_name: KI Design Patterns
site_description: Best Practices für KI-intensive Backend-Systeme
site_author: amkat.de

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font:
    text: Georgia
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.integrate
    - search.highlight
    - search.share

nav:
  - Start: index.md
  - KI Design Patterns (DE): KI-Design-Patterns_DE.md
  - KI Design Patterns (EN): KI-Design-Patterns_EN.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3
