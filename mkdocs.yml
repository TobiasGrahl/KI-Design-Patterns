ssite_name: KI Design Patterns
theme:
  name: material
  language: de
  palette:
    primary: white
    accent: grey
  font:
    text: Crimson Text
    code: Roboto Mono
  features:
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences # Hier keine weiteren Unterpunkte für Mermaid nötig!

# Mermaid wird heute einfach über dieses Plugin aktiviert
plugins:
  - search
