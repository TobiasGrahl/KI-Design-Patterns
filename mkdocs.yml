site_name: KI Design Patterns
theme:
  name: material
  language: de
  palette:
    primary: white  # Klassisch weißer Hintergrund
    accent: indigo
  features:
    - navigation.sections

markdown_extensions:
  - admonition       # Ermöglicht die Infoboxen (Zweck, Motivation)
  - pymdownx.details
  - pymdownx.superfences # Für Code-Blöcke und Diagramme

nav:
  - Home: index.md
  - Patterns: KI-Design-Patterns.md
